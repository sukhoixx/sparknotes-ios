<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b00"/>
      <stop offset="50%" style="stop-color:#ff2088"/>
      <stop offset="100%" style="stop-color:#7b2fff"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.18)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- Shine overlay -->
  <rect width="1024" height="520" rx="220" fill="url(#shine)"/>

  <!-- Square around NB -->
  <rect x="140" y="280" width="744" height="460" rx="40" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="18"/>

  <!-- NB letters -->
  <text x="512" y="660" font-family="Arial Black, sans-serif" font-size="440" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-18">NB</text>
</svg>
