<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3a30"/>
      <stop offset="100%" style="stop-color:#c0000a"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- Subtle white circle behind letters -->
  <circle cx="512" cy="512" r="380" fill="rgba(255,255,255,0.1)"/>

  <!-- NB letters -->
  <text x="512" y="640" font-family="Arial Black, sans-serif" font-size="420" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-20">NB</text>

  <!-- Underline accent -->
  <rect x="180" y="680" width="664" height="18" rx="9" fill="rgba(255,255,255,0.4)"/>
</svg>
